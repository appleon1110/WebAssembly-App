name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore "WebAssembly App.sln"

      - name: Build
        run: dotnet build "WebAssembly App.sln" --configuration Release --no-restore

      - name: Test (detailed)
        run: |
          set -o pipefail
          dotnet test "WebAssembly App.Tests/WebAssembly App.Tests.csproj" --configuration Release --collect:"XPlat Code Coverage" --results-directory "TestResults" --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=detailed" | tee TestResults/test-console.log

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/test-console.log

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Report
          path: "TestResults/**/*.trx"
          reporter: dotnet-trx