name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore "WebAssembly App.sln"

      - name: Build
        run: dotnet build "WebAssembly App.sln" --configuration Release --no-restore

      - name: Test (detailed)
        shell: bash
        run: |
          mkdir -p TestResults
          dotnet test "WebAssembly App.Tests/WebAssembly App.Tests.csproj" \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory "TestResults" \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=detailed" 2>&1 | tee TestResults/test-console.log
          exit ${PIPESTATUS[0]}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/test-console.log

      - name: Debug test result files
        if: always()
        shell: bash
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== find trx ==="
          find . -type f -name "*.trx" -print || true
          echo "=== list TestResults ==="
          ls -R TestResults || true

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Report
          path: "**/test-results.trx"
          reporter: dotnet-trx

      - name: Publish public test files (reports branch)
        if: always() && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin reports; then
            git checkout -B reports origin/reports
          else
            git checkout --orphan reports
            git rm -rf . || true
          fi

          mkdir -p test
          cp -f TestResults/test-console.log test/latest.log
          cp -f TestResults/test-results.trx test/latest.trx

          echo "Updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > test/README.txt

          git add test
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "chore: update public test report [skip ci]" || echo "No changes"
          git push origin reports --force